name: EAS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Checkout SDK
        run: |
          git clone --depth 1 https://github.com/Adamantine-Guild/guildpass-sdk.git "${{ github.workspace }}/../guildpass-sdk"

      - name: Apply SDK patches
        run: |
          cd "${{ github.workspace }}/../guildpass-sdk"
          git apply "${{ github.workspace }}/patches/guildpass-sdk.patch"

      - name: Debug
        run: |
          echo "=== WORKSPACE ==="
          echo "${{ github.workspace }}"
          echo "=== PWD ==="
          pwd
          echo "=== LS ==="
          ls -la
          echo "=== SDK package.json ==="
          head -25 "${{ github.workspace }}/../guildpass-sdk/package.json"

      - name: Install dependencies
        run: npx --yes pnpm@8 install

      - name: Type check
        run: npx --yes pnpm@8 typecheck
        continue-on-error: true

      - name: Lint
        run: npx --yes pnpm@8 lint
        continue-on-error: true

      - name: Run tests
        run: npx --yes pnpm@8 test:run

  build:
    name: EAS Build (${{ github.event.inputs.profile || 'preview' }})
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Checkout SDK
        run: |
          git clone --depth 1 https://github.com/Adamantine-Guild/guildpass-sdk.git "${{ github.workspace }}/../guildpass-sdk"

      - name: Apply SDK patches
        run: |
          cd "${{ github.workspace }}/../guildpass-sdk"
          git apply "${{ github.workspace }}/patches/guildpass-sdk.patch"

      - name: Install dependencies
        run: npx --yes pnpm@8 install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build --platform all --profile "$PROFILE" --non-interactive

      - name: Upload build artifacts
        if: github.event.inputs.profile == 'development'
        uses: actions/upload-artifact@v4
        with:
          name: guildpass-development-build
          path: |
            *.apk
            *.ipa
          if-no-files-found: ignore
