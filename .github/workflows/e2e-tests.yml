name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app
        run: |
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/GuildPass.xcworkspace \
            -scheme GuildPass \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'generic/platform=iOS Simulator'

      - name: Boot iOS Simulator
        run: |
          SIMULATOR_NAME="$(
            xcrun simctl list devices available |
              awk -F '[()]' '/iPhone/ {print $1; exit}' |
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Booting $SIMULATOR_NAME"
          xcrun simctl boot "$SIMULATOR_NAME" || true
          xcrun simctl bootstatus "$SIMULATOR_NAME" -b
          xcrun simctl list devices

      - name: Install app on simulator
        run: |
          xcrun simctl install booted ios/build/Build/Products/Debug-iphonesimulator/GuildPass.app

      - name: Run Maestro E2E tests
        run: |
          maestro test .maestro/ --format junit --output test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-ios
          path: test-results/

      - name: Upload Maestro recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-recordings-ios
          path: ~/.maestro/tests/**/*.mp4

  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: echo "Emulator started"

      - name: Build Android app
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/ --format junit --output test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-android
          path: test-results/

      - name: Upload Maestro recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-recordings-android
          path: ~/.maestro/tests/**/*.mp4
